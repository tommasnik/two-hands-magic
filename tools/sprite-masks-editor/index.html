<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprite Masks Editor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* Left panel */
  #sidebar {
    width: 240px;
    background: #16213e;
    border-right: 2px solid #0f3460;
    overflow-y: auto;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
  }

  .sidebar-section {
    padding: 8px;
    border-bottom: 1px solid #0f3460;
  }
  .sidebar-section:last-child { border-bottom: none; }

  .sidebar-label {
    font-size: 11px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  select.char-select {
    width: 100%;
    padding: 6px 8px;
    background: #1a1a2e;
    border: 1px solid #333;
    border-radius: 4px;
    color: #e0e0e0;
    font-size: 13px;
    cursor: pointer;
  }
  select.char-select:focus { outline: 1px solid #e94560; }

  .anim-btn {
    display: block;
    width: 100%;
    padding: 6px 8px;
    margin-bottom: 2px;
    background: #1a1a2e;
    border: 1px solid #333;
    border-radius: 4px;
    color: #ccc;
    font-size: 13px;
    cursor: pointer;
    text-align: left;
  }
  .anim-btn:hover { background: #2a2a4e; }
  .anim-btn.active {
    background: #0f3460;
    border-color: #e94560;
    color: #fff;
  }
  .anim-btn .frame-count {
    float: right;
    font-size: 11px;
    color: #666;
  }

  #frames-section {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .frame-btn {
    display: block;
    width: 100%;
    padding: 6px 8px;
    margin-bottom: 2px;
    background: #1a1a2e;
    border: 1px solid #333;
    border-radius: 4px;
    color: #ccc;
    font-size: 13px;
    cursor: pointer;
    text-align: left;
  }
  .frame-btn:hover { background: #2a2a4e; }
  .frame-btn.active {
    background: #0f3460;
    border-color: #e94560;
    color: #fff;
  }
  .frame-btn .mask-status {
    float: right;
    font-size: 10px;
  }
  .frame-btn .mask-status.has-mask { color: #0a5; }
  .frame-btn .mask-status.no-mask { color: #555; }

  /* Main area */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    overflow: auto;
    position: relative;
  }

  /* Toolbar */
  #toolbar {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .zone-btn {
    padding: 6px 14px;
    border: 2px solid #555;
    border-radius: 6px;
    background: #2a2a4e;
    color: #fff;
    font-size: 13px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .zone-btn.active { border-color: #fff; box-shadow: 0 0 8px rgba(255,255,255,0.3); }
  .zone-btn[data-zone="crit"] { background: #ff0000; color: #fff; }
  .zone-btn[data-zone="hit"] { background: #ffff00; color: #000; }
  .zone-btn[data-zone="graze"] { background: #00ff00; color: #000; }
  .zone-btn[data-zone="erase"] { background: #444; color: #fff; }

  .toolbar-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .toolbar-group label {
    font-size: 12px;
    color: #aaa;
  }
  #brushSizeSlider { width: 100px; }
  #brushSizeValue { font-size: 12px; color: #ccc; min-width: 30px; }

  .action-btn {
    padding: 6px 14px;
    border: 1px solid #555;
    border-radius: 6px;
    background: #16213e;
    color: #e0e0e0;
    font-size: 13px;
    cursor: pointer;
  }
  .action-btn:hover { background: #1a3a6e; }
  .action-btn.reset { background: #a50; color: #fff; border-color: #a50; }
  .action-btn.reset:hover { background: #b60; }

  /* Canvas area */
  #canvas-wrapper {
    position: relative;
    width: 512px;
    height: 512px;
    border: 2px solid #0f3460;
    border-radius: 4px;
    background: repeating-conic-gradient(#333 0% 25%, #2a2a2a 0% 50%) 50% / 32px 32px;
    cursor: crosshair;
  }
  #canvas-wrapper canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 512px;
    height: 512px;
    image-rendering: pixelated;
  }
  #spriteCanvas { z-index: 1; }
  #maskCanvas { z-index: 2; opacity: 0.5; }
  #cursorCanvas { z-index: 3; pointer-events: none; }

  /* Info bar */
  #info-bar {
    margin-top: 8px;
    font-size: 12px;
    color: #888;
  }
  kbd {
    background: #333;
    border: 1px solid #555;
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 11px;
  }

  /* Save indicator */
  #save-indicator {
    position: fixed;
    bottom: 16px;
    right: 16px;
    padding: 8px 16px;
    background: #0a5;
    color: #fff;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 100;
  }
  #save-indicator.visible { opacity: 1; }
  #save-indicator.saving { background: #a50; }
  #save-indicator.error { background: #a00; }

  /* Empty state */
  #empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1;
    color: #555;
    font-size: 16px;
  }
</style>
</head>
<body>

<div id="sidebar">
  <div class="sidebar-section">
    <div class="sidebar-label">Character</div>
    <select class="char-select" id="charSelect">
      <option value="">Loading...</option>
    </select>
  </div>
  <div class="sidebar-section" id="anims-section" style="display:none">
    <div class="sidebar-label">Animation</div>
    <div id="anim-buttons"></div>
  </div>
  <div id="frames-section" style="display:none">
    <div class="sidebar-label">Frames</div>
    <div id="frame-buttons"></div>
  </div>
</div>

<div id="main">
  <div id="toolbar" style="display:none">
    <button class="zone-btn active" data-zone="crit" title="Key: 1">1 Crit</button>
    <button class="zone-btn" data-zone="hit" title="Key: 2">2 Hit</button>
    <button class="zone-btn" data-zone="graze" title="Key: 3">3 Graze</button>
    <button class="zone-btn" data-zone="erase" title="Key: 0">0 Erase</button>

    <div class="toolbar-group">
      <label>Brush:</label>
      <input type="range" id="brushSizeSlider" min="1" max="32" value="8">
      <span id="brushSizeValue">8</span>
    </div>

    <button class="action-btn" id="copyPrevBtn" title="Copy mask from previous frame (Shift+C)">Copy from Prev</button>
    <button class="action-btn" id="trimBtn" title="Trim mask to sprite bounds (Shift+T)">Trim to Sprite</button>
    <button class="action-btn reset" id="resetBtn" title="Reset mask to auto-generated zones">Reset to Auto</button>
  </div>

  <div id="canvas-wrapper" style="display:none">
    <canvas id="spriteCanvas"></canvas>
    <canvas id="maskCanvas"></canvas>
    <canvas id="cursorCanvas" width="512" height="512"></canvas>
  </div>

  <div id="info-bar" style="display:none">
    <kbd>1</kbd> Crit &nbsp; <kbd>2</kbd> Hit &nbsp; <kbd>3</kbd> Graze &nbsp; <kbd>0</kbd> Erase &nbsp;
    <kbd>Ctrl+Z</kbd> Undo &nbsp;
    <kbd>Shift+C</kbd> Copy prev &nbsp;
    <kbd>Shift+T</kbd> Trim &nbsp; | &nbsp;
    Left click = paint &nbsp; Right click = erase &nbsp; | &nbsp;
    Auto-saves after 1s
  </div>

  <div id="empty-state">Select a character and animation to begin</div>
</div>

<div id="save-indicator">Saved</div>

<script>
const DISPLAY_SIZE = 512;
const MAX_UNDO = 50;

const ZONES = {
  crit:  { r: 255, g: 0,   b: 0,   a: 255 },
  hit:   { r: 255, g: 255, b: 0,   a: 255 },
  graze: { r: 0,   g: 255, b: 0,   a: 255 },
  erase: { r: 0,   g: 0,   b: 0,   a: 0   },
};

// State
let characters = [];
let currentChar = null;
let currentAnim = null;
let frames = [];
let currentFrameIdx = -1;
let canvasSize = 128;
let scale = DISPLAY_SIZE / canvasSize;

let currentZone = 'crit';
let brushSize = 8;
let isPainting = false;
let paintZone = null;

const maskDataStore = {};
const undoStacks = {};
const spriteImages = {};
const dirtyFrames = new Set();
let saveTimer = null;

// DOM
const charSelect = document.getElementById('charSelect');
const animsSection = document.getElementById('anims-section');
const animButtons = document.getElementById('anim-buttons');
const framesSection = document.getElementById('frames-section');
const frameButtons = document.getElementById('frame-buttons');
const toolbar = document.getElementById('toolbar');
const canvasWrapper = document.getElementById('canvas-wrapper');
const infoBar = document.getElementById('info-bar');
const emptyState = document.getElementById('empty-state');
const saveIndicator = document.getElementById('save-indicator');

const spriteCanvas = document.getElementById('spriteCanvas');
const spriteCtx = spriteCanvas.getContext('2d');
const maskCanvas = document.getElementById('maskCanvas');
const maskCtx = maskCanvas.getContext('2d');
const cursorCanvas = document.getElementById('cursorCanvas');
const cursorCtx = cursorCanvas.getContext('2d');

const brushSlider = document.getElementById('brushSizeSlider');
const brushValue = document.getElementById('brushSizeValue');

// ============================================================
// API
// ============================================================
async function apiGetCharacters() {
  const res = await fetch('/api/characters');
  return res.json();
}

async function apiSaveMask(charId, filename, pngBlob) {
  const res = await fetch(`/api/characters/${charId}/masks/${filename}`, {
    method: 'POST',
    body: pngBlob,
  });
  return res.json();
}

// ============================================================
// Character select
// ============================================================
async function loadCharacters() {
  characters = await apiGetCharacters();
  charSelect.innerHTML = '<option value="">-- select --</option>';
  characters.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = c.id;
    charSelect.appendChild(opt);
  });
}

charSelect.addEventListener('change', () => {
  const id = charSelect.value;
  if (!id) return;
  currentChar = characters.find(c => c.id === id);
  currentAnim = null;
  currentFrameIdx = -1;
  frames = [];
  clearStores();
  buildAnimButtons();
  hideEditor();
});

// ============================================================
// Animation buttons
// ============================================================
function buildAnimButtons() {
  animButtons.innerHTML = '';
  if (!currentChar) { animsSection.style.display = 'none'; return; }

  animsSection.style.display = '';
  const anims = Object.entries(currentChar.animations);
  anims.forEach(([key, anim]) => {
    const btn = document.createElement('button');
    btn.className = 'anim-btn';
    btn.innerHTML = `${key} <span class="frame-count">${anim.frameCount}f</span>`;
    btn.dataset.anim = key;
    btn.addEventListener('click', () => selectAnim(key));
    animButtons.appendChild(btn);
  });
}

async function selectAnim(animKey) {
  // Save any dirty masks from previous animation before switching
  await flushDirty();

  currentAnim = animKey;
  const animDef = currentChar.animations[animKey];
  currentFrameIdx = -1;
  clearStores();

  // Update anim button UI
  document.querySelectorAll('.anim-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.anim === animKey);
  });

  // Build frame list
  frames = [];
  for (let i = 0; i < animDef.frameCount; i++) {
    const pad = String(i).padStart(2, '0');
    frames.push({
      name: `${animKey}_${pad}`,
      anim: animKey,
      index: i,
      framePath: `/assets/characters/${currentChar.id}/frames/${animKey}_${pad}.png`,
      maskPath: `/assets/characters/${currentChar.id}/masks/${animKey}_${pad}.png`,
      maskFilename: `${animKey}_${pad}.png`,
    });
  }

  // Detect canvas size from first sprite
  await detectCanvasSize();

  // Load all sprites + existing masks
  await loadAllAssets();

  // Build frame buttons
  buildFrameButtons();

  // Select first frame
  selectFrame(0);
}

async function detectCanvasSize() {
  if (frames.length === 0) return;
  const img = await loadImage(frames[0].framePath);
  if (img) {
    canvasSize = img.naturalWidth;
    scale = DISPLAY_SIZE / canvasSize;
    spriteCanvas.width = canvasSize;
    spriteCanvas.height = canvasSize;
    maskCanvas.width = canvasSize;
    maskCanvas.height = canvasSize;
  }
}

// ============================================================
// Frame buttons
// ============================================================
function buildFrameButtons() {
  frameButtons.innerHTML = '';
  framesSection.style.display = '';

  frames.forEach((frame, idx) => {
    const btn = document.createElement('button');
    btn.className = 'frame-btn';
    const hasMask = !!maskDataStore[frame.name];
    btn.innerHTML = `${frame.name} <span class="mask-status ${hasMask ? 'has-mask' : 'no-mask'}">${hasMask ? 'mask' : ''}</span>`;
    btn.dataset.index = idx;
    btn.addEventListener('click', () => selectFrame(idx));
    frameButtons.appendChild(btn);
  });
}

function updateFrameButtonsUI() {
  document.querySelectorAll('.frame-btn').forEach(btn => {
    const idx = parseInt(btn.dataset.index);
    btn.classList.toggle('active', idx === currentFrameIdx);
    const hasMask = !!maskDataStore[frames[idx].name];
    const statusEl = btn.querySelector('.mask-status');
    statusEl.className = `mask-status ${hasMask ? 'has-mask' : 'no-mask'}`;
    statusEl.textContent = hasMask ? 'mask' : '';
  });
}

// ============================================================
// Image loading
// ============================================================
function loadImage(src) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = src;
  });
}

async function loadAllAssets() {
  await Promise.all(frames.map(async (frame) => {
    // Load sprite
    const spriteImg = await loadImage(frame.framePath);
    if (spriteImg) spriteImages[frame.name] = spriteImg;

    // Load existing mask
    const maskImg = await loadImage(frame.maskPath);
    if (maskImg) {
      const tmpCanvas = document.createElement('canvas');
      tmpCanvas.width = canvasSize;
      tmpCanvas.height = canvasSize;
      const tmpCtx = tmpCanvas.getContext('2d');
      tmpCtx.drawImage(maskImg, 0, 0);
      maskDataStore[frame.name] = tmpCtx.getImageData(0, 0, canvasSize, canvasSize);
      undoStacks[frame.name] = [];
    }
  }));
}

function clearStores() {
  for (const k of Object.keys(maskDataStore)) delete maskDataStore[k];
  for (const k of Object.keys(undoStacks)) delete undoStacks[k];
  for (const k of Object.keys(spriteImages)) delete spriteImages[k];
  dirtyFrames.clear();
}

// ============================================================
// Editor show/hide
// ============================================================
function showEditor() {
  toolbar.style.display = '';
  canvasWrapper.style.display = '';
  infoBar.style.display = '';
  emptyState.style.display = 'none';
}

function hideEditor() {
  toolbar.style.display = 'none';
  canvasWrapper.style.display = 'none';
  infoBar.style.display = 'none';
  emptyState.style.display = '';
  framesSection.style.display = 'none';
}

// ============================================================
// Frame selection & rendering
// ============================================================
function selectFrame(idx) {
  if (idx < 0 || idx >= frames.length) return;
  currentFrameIdx = idx;
  showEditor();
  render();
}

function render() {
  renderSprite();
  renderMask();
  updateFrameButtonsUI();
}

function renderSprite() {
  const frame = frames[currentFrameIdx];
  spriteCtx.clearRect(0, 0, canvasSize, canvasSize);
  const img = spriteImages[frame.name];
  if (img) spriteCtx.drawImage(img, 0, 0);
}

function renderMask() {
  const frame = frames[currentFrameIdx];
  const maskData = getMaskData(frame.name);
  maskCtx.putImageData(maskData, 0, 0);
}

// ============================================================
// Mask data
// ============================================================
function getMaskData(frameName) {
  if (!maskDataStore[frameName]) {
    maskDataStore[frameName] = autoGenerateMask(frameName);
    undoStacks[frameName] = [];
  }
  return maskDataStore[frameName];
}

function autoGenerateMask(frameName) {
  const img = spriteImages[frameName];
  if (!img) return new ImageData(canvasSize, canvasSize);

  const tmpCanvas = document.createElement('canvas');
  tmpCanvas.width = canvasSize;
  tmpCanvas.height = canvasSize;
  const tmpCtx = tmpCanvas.getContext('2d');
  tmpCtx.drawImage(img, 0, 0);
  const spriteData = tmpCtx.getImageData(0, 0, canvasSize, canvasSize);

  let minY = canvasSize, maxY = -1;
  for (let y = 0; y < canvasSize; y++) {
    for (let x = 0; x < canvasSize; x++) {
      if (spriteData.data[(y * canvasSize + x) * 4 + 3] > 0) {
        if (y < minY) minY = y;
        if (y > maxY) maxY = y;
      }
    }
  }

  const maskData = new ImageData(canvasSize, canvasSize);
  if (maxY < 0) return maskData;

  const bbHeight = maxY - minY + 1;
  const thirdH = bbHeight / 3;

  for (let y = 0; y < canvasSize; y++) {
    for (let x = 0; x < canvasSize; x++) {
      const idx = (y * canvasSize + x) * 4;
      if (spriteData.data[idx + 3] > 0) {
        const relY = y - minY;
        const zone = relY < thirdH ? ZONES.crit : relY < thirdH * 2 ? ZONES.hit : ZONES.graze;
        maskData.data[idx]     = zone.r;
        maskData.data[idx + 1] = zone.g;
        maskData.data[idx + 2] = zone.b;
        maskData.data[idx + 3] = zone.a;
      }
    }
  }
  return maskData;
}

// ============================================================
// Undo
// ============================================================
function pushUndo(frameName) {
  const stack = undoStacks[frameName] || (undoStacks[frameName] = []);
  const current = maskDataStore[frameName];
  stack.push(new ImageData(new Uint8ClampedArray(current.data), canvasSize, canvasSize));
  if (stack.length > MAX_UNDO) stack.shift();
}

function undo() {
  if (currentFrameIdx < 0) return;
  const frameName = frames[currentFrameIdx].name;
  const stack = undoStacks[frameName];
  if (!stack || stack.length === 0) return;
  maskDataStore[frameName] = stack.pop();
  markDirty(frameName);
  renderMask();
}

// ============================================================
// Painting
// ============================================================
function getCanvasPos(e) {
  const rect = maskCanvas.getBoundingClientRect();
  return {
    x: Math.floor((e.clientX - rect.left) / scale),
    y: Math.floor((e.clientY - rect.top) / scale),
  };
}

function paintAt(x, y, zone) {
  const frameName = frames[currentFrameIdx].name;
  const maskData = getMaskData(frameName);
  const data = maskData.data;
  const z = ZONES[zone];
  const r = Math.floor(brushSize / 2);

  for (let dy = -r; dy <= r; dy++) {
    for (let dx = -r; dx <= r; dx++) {
      if (dx * dx + dy * dy > r * r) continue;
      const px = x + dx;
      const py = y + dy;
      if (px < 0 || px >= canvasSize || py < 0 || py >= canvasSize) continue;
      const idx = (py * canvasSize + px) * 4;
      data[idx]     = z.r;
      data[idx + 1] = z.g;
      data[idx + 2] = z.b;
      data[idx + 3] = z.a;
    }
  }
  renderMask();
}

maskCanvas.addEventListener('mousedown', (e) => {
  e.preventDefault();
  if (currentFrameIdx < 0) return;
  const pos = getCanvasPos(e);
  pushUndo(frames[currentFrameIdx].name);
  paintZone = e.button === 2 ? 'erase' : currentZone;
  isPainting = true;
  paintAt(pos.x, pos.y, paintZone);
  markDirty(frames[currentFrameIdx].name);
});

maskCanvas.addEventListener('mousemove', (e) => {
  const pos = getCanvasPos(e);
  drawCursor(pos.x, pos.y);
  if (!isPainting) return;
  paintAt(pos.x, pos.y, paintZone);
});

window.addEventListener('mouseup', () => {
  isPainting = false;
  paintZone = null;
});

maskCanvas.addEventListener('contextmenu', (e) => e.preventDefault());

// ============================================================
// Cursor
// ============================================================
function drawCursor(x, y) {
  cursorCtx.clearRect(0, 0, DISPLAY_SIZE, DISPLAY_SIZE);
  const cx = x * scale + scale / 2;
  const cy = y * scale + scale / 2;
  const r = (brushSize / 2) * scale;
  cursorCtx.beginPath();
  cursorCtx.arc(cx, cy, r, 0, Math.PI * 2);
  cursorCtx.strokeStyle = 'rgba(255,255,255,0.7)';
  cursorCtx.lineWidth = 1;
  cursorCtx.stroke();
}

document.getElementById('canvas-wrapper').addEventListener('mouseleave', () => {
  cursorCtx.clearRect(0, 0, DISPLAY_SIZE, DISPLAY_SIZE);
});

// ============================================================
// Zone buttons
// ============================================================
function updateZoneUI() {
  document.querySelectorAll('.zone-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.zone === currentZone);
  });
}

document.querySelectorAll('.zone-btn').forEach(btn => {
  btn.addEventListener('click', () => { currentZone = btn.dataset.zone; updateZoneUI(); });
});

// ============================================================
// Brush size
// ============================================================
brushSlider.addEventListener('input', () => {
  brushSize = parseInt(brushSlider.value);
  brushValue.textContent = brushSize;
});

// ============================================================
// Keyboard shortcuts
// ============================================================
document.addEventListener('keydown', (e) => {
  if (e.key === '1') { currentZone = 'crit';  updateZoneUI(); }
  if (e.key === '2') { currentZone = 'hit';   updateZoneUI(); }
  if (e.key === '3') { currentZone = 'graze'; updateZoneUI(); }
  if (e.key === '0') { currentZone = 'erase'; updateZoneUI(); }
  if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
  if (e.shiftKey && e.key === 'C') copyMaskFromPrev();
  if (e.shiftKey && e.key === 'T') trimMaskToSprite();
});

// ============================================================
// Copy from prev
// ============================================================
function copyMaskFromPrev() {
  if (currentFrameIdx <= 0) return;
  const currentName = frames[currentFrameIdx].name;
  const prevName = frames[currentFrameIdx - 1].name;
  const prevMask = getMaskData(prevName);
  pushUndo(currentName);
  maskDataStore[currentName] = new ImageData(new Uint8ClampedArray(prevMask.data), canvasSize, canvasSize);
  markDirty(currentName);
  renderMask();
}

document.getElementById('copyPrevBtn').addEventListener('click', copyMaskFromPrev);

// ============================================================
// Trim to sprite
// ============================================================
function trimMaskToSprite() {
  if (currentFrameIdx < 0) return;
  const frameName = frames[currentFrameIdx].name;
  const img = spriteImages[frameName];
  if (!img) return;

  const tmpCanvas = document.createElement('canvas');
  tmpCanvas.width = canvasSize;
  tmpCanvas.height = canvasSize;
  const tmpCtx = tmpCanvas.getContext('2d');
  tmpCtx.drawImage(img, 0, 0);
  const spriteData = tmpCtx.getImageData(0, 0, canvasSize, canvasSize);

  pushUndo(frameName);
  const md = getMaskData(frameName).data;
  const sd = spriteData.data;
  for (let i = 0; i < md.length; i += 4) {
    if (sd[i + 3] === 0) { md[i] = 0; md[i+1] = 0; md[i+2] = 0; md[i+3] = 0; }
  }
  markDirty(frameName);
  renderMask();
}

document.getElementById('trimBtn').addEventListener('click', trimMaskToSprite);

// ============================================================
// Reset to auto
// ============================================================
document.getElementById('resetBtn').addEventListener('click', () => {
  if (currentFrameIdx < 0) return;
  const frameName = frames[currentFrameIdx].name;
  pushUndo(frameName);
  maskDataStore[frameName] = autoGenerateMask(frameName);
  markDirty(frameName);
  renderMask();
});

// ============================================================
// Auto-save system
// ============================================================
function markDirty(frameName) {
  dirtyFrames.add(frameName);
  scheduleSave();
}

function scheduleSave() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(() => flushDirty(), 1000);
}

async function flushDirty() {
  if (dirtyFrames.size === 0) return;

  const toSave = [...dirtyFrames];
  dirtyFrames.clear();
  if (saveTimer) { clearTimeout(saveTimer); saveTimer = null; }

  showSaveIndicator('Saving...', 'saving');

  try {
    await Promise.all(toSave.map(frameName => {
      const frame = frames.find(f => f.name === frameName);
      if (!frame) return;
      const maskData = maskDataStore[frameName];
      if (!maskData) return;
      return saveMaskToDisk(frame, maskData);
    }));
    showSaveIndicator('Saved', '');
  } catch (err) {
    console.error('Save failed:', err);
    showSaveIndicator('Save failed!', 'error');
    toSave.forEach(f => dirtyFrames.add(f));
  }
}

function saveMaskToDisk(frame, maskData) {
  return new Promise((resolve, reject) => {
    const tmpCanvas = document.createElement('canvas');
    tmpCanvas.width = canvasSize;
    tmpCanvas.height = canvasSize;
    const tmpCtx = tmpCanvas.getContext('2d');
    tmpCtx.putImageData(maskData, 0, 0);
    tmpCanvas.toBlob(async (blob) => {
      try {
        await apiSaveMask(currentChar.id, frame.maskFilename, blob);
        resolve();
      } catch (e) { reject(e); }
    }, 'image/png');
  });
}

function showSaveIndicator(text, cls) {
  saveIndicator.textContent = text;
  saveIndicator.className = 'visible' + (cls ? ' ' + cls : '');
  if (cls !== 'saving') {
    setTimeout(() => { saveIndicator.className = ''; }, 2000);
  }
}

// Save before leaving
window.addEventListener('beforeunload', (e) => {
  if (dirtyFrames.size > 0) {
    e.preventDefault();
    e.returnValue = '';
  }
});

// ============================================================
// Init
// ============================================================
loadCharacters();
</script>
